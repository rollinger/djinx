name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - 'v*'               # triggers on version tags like v1.0.0, v2.3.4
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"] #["3.8", "3.9", "3.10", "3.11"]   # adjust as needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install your package with dev dependencies
          pip install -e .[dev]

      - name: Run pre-commit (linting)
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Run pytest
        run: |
          pytest -v --cov=djxi --cov-report=xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    # Only run for version tags (v*) – not for branch pushes or PRs
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # REQUIRED for trusted publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password/token – using trusted publishing (OIDC)
          trusted-publishing: true
          # If you want to publish to Test PyPI instead, uncomment:
          # repository-url: https://test.pypi.org/legacy/