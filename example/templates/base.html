{% load static %}
{% load djxi %}

<!doctype html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <link rel="stylesheet" href="{% static "style.css" %}">
      {% htmx_script_inclusion %}
      <title>{% block title %}Djxi{% endblock %}</title>
  </head>
  <body {% htmx_headers %}>
    <div style="float: right;">
        {% flash_messages_inclusion %}
    </div>
    <div id="content">
        {% block content %}{% endblock %}
    </div>
  </body>
</html>
